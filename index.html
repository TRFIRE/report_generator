<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TR FIRE - Relatórios Digitais</title>
  <meta name="theme-color" content="#002f5b">
  
  <!-- Ícone para dispositivos Apple -->
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/792/792107.png">

  <!-- Manifest PWA Injetado Dinamicamente (Garante 100% de compatibilidade no Chrome) -->
  <script>
    const manifestData = {
      "name": "TR FIRE - Relatórios Digitais",
      "short_name": "TR FIRE",
      "start_url": window.location.pathname,
      "display": "standalone",
      "background_color": "#f3f4f6",
      "theme_color": "#002f5b",
      "icons": [
        {
          "src": "https://cdn-icons-png.flaticon.com/512/792/792107.png",
          "sizes": "192x192",
          "type": "image/png",
          "purpose": "any maskable"
        },
        {
          "src": "https://cdn-icons-png.flaticon.com/512/792/792107.png",
          "sizes": "512x512",
          "type": "image/png",
          "purpose": "any maskable"
        }
      ]
    };
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestData));
    document.head.appendChild(manifestLink);
  </script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Phosphor Icons (Ícones) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Bibliotecas React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (Compila o JSX no navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [step, setStep] = useState(1);
      const [isGenerating, setIsGenerating] = useState(false);
      const [successMessage, setSuccessMessage] = useState('');
      const [errors, setErrors] = useState({});
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [installPrompt, setInstallPrompt] = useState(null);
      const [swStatus, setSwStatus] = useState('A verificar ligação...');
      
      const fileInputRef = useRef(null);
      
      // Estados para Assinatura
      const sigCanvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [hasSignature, setHasSignature] = useState(false);

      const [settings, setSettings] = useState({ leftLogo: '', rightLogo: '', unitName: 'PARQUE LOGÍSTICO AERO GRU I' });

      const [formData, setFormData] = useState({
        responsavel: '',
        matricula: '',
        local: '',
        type: '',
        date: new Date().toISOString().split('T')[0],
        time: new Date().toTimeString().split(' ')[0].substring(0, 5),
        description: '',
        action: '',
        observations: ''
      });

      const [images, setImages] = useState([]);

      const reportTypes = [
        "CAPTURA DE ANIMAL PEÇONHENTO",
        "ATENDIMENTO DE PRIMEIROS SOCORROS",
        "ACOMPANHAMENTO DE ATIVIDADES",
        "PRINCÍPIO DE INCÊNDIO",
        "DANOS MATERIAIS"
      ];

      useEffect(() => {
        // Carregar configurações locais
        const savedSettings = localStorage.getItem('reportSettings');
        if (savedSettings) {
          setSettings(JSON.parse(savedSettings));
        }

        // Registrar Service Worker físico do GitHub
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js')
            .then(() => {
              setSwStatus('✅ Ativo e Pronto (sw.js encontrado)');
            })
            .catch((err) => {
              console.log('SW não registado:', err);
              setSwStatus('❌ Erro: Ficheiro sw.js não encontrado no GitHub');
            });
        } else {
          setSwStatus('❌ O seu navegador não suporta PWA');
        }

        // Evento de instalação PWA (Chrome)
        const handleBeforeInstallPrompt = (e) => {
          e.preventDefault();
          setInstallPrompt(e);
        };

        window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
        return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
      }, []);

      // Configurar o Canvas de Assinatura quando entrar na Tela 2
      useEffect(() => {
        if (step === 2 && sigCanvasRef.current) {
          const ctx = sigCanvasRef.current.getContext('2d');
          ctx.lineWidth = 3;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.strokeStyle = '#002f5b'; // Cor da caneta (Azul Escuro)
        }
      }, [step]);

      const handleInstallClick = async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        const { outcome } = await installPrompt.userChoice;
        if (outcome === 'accepted') {
          setInstallPrompt(null);
          setSuccessMessage("Aplicação instalada com sucesso!");
          setTimeout(() => setSuccessMessage(''), 4000);
        }
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
        if (errors[name]) setErrors(prev => ({ ...prev, [name]: '' }));
      };

      const handleSettingChange = (field, value) => {
        const newSettings = { ...settings, [field]: value };
        setSettings(newSettings);
        localStorage.setItem('reportSettings', JSON.stringify(newSettings));
      };

      const handleLogoUpload = (e, side) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            handleSettingChange(side, event.target.result);
          };
          reader.readAsDataURL(file);
        }
      };

      // Funções do Canvas de Assinatura
      const getCoordinates = (canvas, event) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        let clientX = event.clientX;
        let clientY = event.clientY;

        if (event.touches && event.touches.length > 0) {
          clientX = event.touches[0].clientX;
          clientY = event.touches[0].clientY;
        }

        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDrawing = (e) => {
        setIsDrawing(true);
        const { x, y } = getCoordinates(sigCanvasRef.current, e);
        const ctx = sigCanvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault(); // Previne o ecrã de deslizar ao assinar
        const { x, y } = getCoordinates(sigCanvasRef.current, e);
        const ctx = sigCanvasRef.current.getContext('2d');
        ctx.lineTo(x, y);
        ctx.stroke();
        setHasSignature(true);
      };

      const stopDrawing = () => {
        setIsDrawing(false);
        const ctx = sigCanvasRef.current?.getContext('2d');
        if(ctx) ctx.closePath();
      };

      const clearSignature = () => {
        const canvas = sigCanvasRef.current;
        if(canvas) {
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          setHasSignature(false);
        }
      };

      const validateStep1 = () => {
        const newErrors = {};
        if (!formData.responsavel) newErrors.responsavel = 'Obrigatório';
        if (!formData.matricula) newErrors.matricula = 'Obrigatório';
        if (!formData.local) newErrors.local = 'Obrigatório';
        if (!formData.type) newErrors.type = 'Selecione o tipo';
        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const validateStep2 = () => {
        const newErrors = {};
        if (!formData.date) newErrors.date = 'Data é obrigatória';
        if (!formData.time) newErrors.time = 'Horário é obrigatório';
        if (!formData.description) newErrors.description = 'Descrição é obrigatória';
        if (!formData.action) newErrors.action = 'Ação imediata é obrigatória';
        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const handleNextStep = () => {
        if (validateStep1()) setStep(2);
      };

      const handleImageUpload = (e) => {
        const files = Array.from(e.target.files);
        if (images.length + files.length > 3) {
          alert("Pode anexar no máximo 3 imagens.");
          return;
        }

        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 800;
              const scaleSize = MAX_WIDTH / img.width;
              canvas.width = MAX_WIDTH;
              canvas.height = img.height * scaleSize;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              setImages(prev => [...prev, canvas.toDataURL('image/jpeg', 0.8)]);
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        });
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const removeImage = (indexToRemove) => {
        setImages(prev => prev.filter((_, index) => index !== indexToRemove));
      };

      const generatePDF = async (actionType = 'save') => {
        if (!validateStep2()) return;
        if (!window.jspdf) return alert("Erro: Biblioteca de PDF não carregou.");

        setIsGenerating(true);

        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          
          const m = 10;
          const w = 190;
          let y = m;

          doc.setDrawColor(0);
          doc.setLineWidth(0.3);

          // --- CABEÇALHO ---
          doc.rect(m, y, w, 25);
          doc.line(m + 60, y, m + 60, y + 25);
          doc.line(m + 130, y, m + 130, y + 25);

          if (settings.leftLogo) doc.addImage(settings.leftLogo, 'PNG', m + 2, y + 2, 56, 21, undefined, 'FAST');
          else doc.text("Logo 1", m + 25, y + 14);

          if (settings.rightLogo) doc.addImage(settings.rightLogo, 'PNG', m + 132, y + 2, 56, 21, undefined, 'FAST');
          else doc.text("Logo 2", m + 155, y + 14);

          doc.setFontSize(12);
          doc.setFont("helvetica", "bold");
          doc.text("RELATÓRIO BOMBEIRO CIVIL", 105, y + 10, { align: "center" });
          doc.setFontSize(9);
          doc.setFont("helvetica", "normal");
          doc.text((settings.unitName || "").toUpperCase(), 105, y + 18, { align: "center" });
          
          y += 25;

          // --- TABELA METADADOS (MAIS COMPACTA) ---
          const drawCell = (x, cellY, cellW, cellH, title, text) => {
            doc.rect(x, cellY, cellW, cellH);
            doc.setFontSize(6);
            doc.setFont("helvetica", "bold");
            doc.text(title, x + 2, cellY + 3);
            doc.setFontSize(8);
            doc.setFont("helvetica", "normal");
            if(text) {
              const textLines = doc.splitTextToSize(String(text).toUpperCase(), cellW - 4);
              doc.text(textLines, x + 2, cellY + 7);
            }
          };

          drawCell(m, y, 95, 10, "RESPONSÁVEL / BOMBEIRO CIVIL", formData.responsavel);
          drawCell(m + 95, y, 95, 10, "MATRÍCULA", formData.matricula);
          y += 10;

          drawCell(m, y, w, 10, "ÁREA/LOCAL", formData.local);
          y += 10;

          const dateEmissao = new Date().toLocaleDateString('pt-BR');
          const timeEmissao = new Date().toLocaleTimeString('pt-BR').substring(0, 5);
          const dataOcorrencia = formData.date.split('-').reverse().join('/');

          drawCell(m, y, 47.5, 10, "DATA DE EMISSÃO", dateEmissao);
          drawCell(m + 47.5, y, 47.5, 10, "HORÁRIO EMISSÃO", timeEmissao);
          drawCell(m + 95, y, 47.5, 10, "DATA DA OCORRÊNCIA", dataOcorrencia);
          drawCell(m + 142.5, y, 47.5, 10, "HORÁRIO DA OCORRÊNCIA", formData.time);
          y += 10;

          drawCell(m, y, w, 10, "SELECIONAR TIPO DE REGISTRO", formData.type);
          y += 12;

          // --- TEXTOS (MAIS COMPACTOS PARA CABER NUMA PÁGINA) ---
          const drawTextSection = (title, content) => {
            if (!content) return;
            doc.setFillColor(230, 230, 230);
            doc.rect(m, y, w, 6, 'FD'); // Altura do título menor
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.text(title, 105, y + 4.5, { align: "center" });
            y += 6;
            
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            const lines = doc.splitTextToSize(content, w - 4);
            const boxHeight = (lines.length * 4) + 4; // Espaçamento de linhas menor
            
            // Segurança extrema
            if (y + boxHeight > 280) { doc.addPage(); y = m; } 
            
            doc.rect(m, y, w, boxHeight);
            doc.text(lines, m + 2, y + 5);
            y += boxHeight + 3;
          };

          drawTextSection("DESCRIÇÃO DA OCORRÊNCIA", formData.description || "");
          drawTextSection("AÇÃO IMEDIATA / TRATATIVA", formData.action || "");
          drawTextSection("OBSERVAÇÕES", formData.observations || "");

          // --- IMAGENS (LADO A LADO) ---
          if (images.length > 0) {
            // Segurança para as imagens não quebrarem página
            if (y > 220) { doc.addPage(); y = m; }
            
            doc.setFillColor(230, 230, 230);
            doc.rect(m, y, w, 6, 'FD');
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.text("REGISTRO FOTOGRÁFICO", 105, y + 4.5, { align: "center" });
            y += 8;

            const maxImgHeight = 65; 
            const imgSpacing = 5;
            const totalSpacing = (images.length - 1) * imgSpacing;
            const maxSlotWidth = (w - totalSpacing) / images.length;
            
            let currentX = m;
            let maxActualHeight = 0;

            images.forEach((imgData, idx) => {
              const props = doc.getImageProperties(imgData);
              const scaleW = maxSlotWidth / props.width;
              const scaleH = maxImgHeight / props.height;
              const scale = Math.min(scaleW, scaleH);
              const finalW = props.width * scale;
              const finalH = props.height * scale;
              const offsetX = currentX + (maxSlotWidth - finalW) / 2;
              
              doc.addImage(imgData, 'JPEG', offsetX, y, finalW, finalH);
              doc.setDrawColor(150);
              doc.rect(offsetX, y, finalW, finalH);
              
              doc.setFontSize(7);
              doc.setFont("helvetica", "bold");
              doc.text(`ANEXO ${idx + 1}`, currentX + (maxSlotWidth / 2), y + finalH + 4, { align: "center" });

              if (finalH + 5 > maxActualHeight) maxActualHeight = finalH + 5;
              currentX += maxSlotWidth + imgSpacing;
            });

            y += maxActualHeight + 10;
          }

          // --- ASSINATURA ---
          if (y > 265) { doc.addPage(); y = m; } 
          else if (y < 235) { y = 250; } // Empurra a assinatura para o fim

          // Adicionar Assinatura Digital se houver
          if (hasSignature && sigCanvasRef.current) {
            const sigData = sigCanvasRef.current.toDataURL('image/png');
            // Centraliza a assinatura acima da linha (X=75 a X=135, largura=60)
            doc.addImage(sigData, 'PNG', 75, y - 22, 60, 22);
          }
          
          doc.setDrawColor(0);
          doc.line(65, y, 145, y); // Linha de assinatura
          doc.setFontSize(9);
          doc.setFont("helvetica", "bold");
          doc.text(formData.responsavel.toUpperCase(), 105, y + 5, { align: "center" });
          const extensoData = new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
          doc.setFont("helvetica", "normal");
          doc.text(extensoData.toUpperCase(), 105, y + 10, { align: "center" });

          // --- FINALIZAR E EXPORTAR ---
          const fileName = `${formData.type.replace(/\s+/g, '_')}_${dataOcorrencia.replace(/\//g, '-')}_${formData.responsavel.split(' ')[0]}.pdf`;
          
          if (actionType === 'share') {
            const blob = doc.output('blob');
            const file = new File([blob], fileName, { type: 'application/pdf' });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
              try {
                await navigator.share({ files: [file], title: 'Relatório', text: 'Segue relatório em anexo.' });
                setSuccessMessage("Opções de partilha abertas!");
              } catch (err) { console.log("Partilha cancelada", err); }
            } else {
              alert("Partilha nativa não suportada. O ficheiro será guardado.");
              doc.save(fileName);
              setSuccessMessage("Relatório guardado!");
            }
          } else {
            doc.save(fileName);
            setSuccessMessage("Relatório guardado com sucesso!");
          }
          setTimeout(() => setSuccessMessage(''), 4000);
        } catch (err) {
          console.error(err);
          alert("Ocorreu um erro ao gerar o PDF.");
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <div className="min-h-screen flex flex-col font-sans sm:justify-center sm:py-8">
          <div className="flex-1 w-full sm:max-w-md mx-auto bg-white sm:rounded-2xl sm:shadow-2xl overflow-hidden flex flex-col relative">
            
            <div className="bg-[#002f5b] px-6 py-4 shadow-md z-10 sticky top-0 flex items-center justify-between">
              <div className="flex items-center gap-2 text-white">
                {step === 2 && (
                  <button onClick={() => setStep(1)} className="mr-2 p-1 rounded-full hover:bg-white/20 transition-colors">
                    <i className="ph-bold ph-arrow-left text-[22px]"></i>
                  </button>
                )}
                <i className="ph-fill ph-file-text text-yellow-400 text-2xl"></i>
                <h1 className="text-xl font-bold tracking-wide">TR FIRE</h1>
              </div>
              
              <div className="flex items-center gap-2">
                {installPrompt && (
                  <button 
                    onClick={handleInstallClick}
                    className="flex items-center gap-1.5 bg-blue-500 hover:bg-blue-400 text-white px-3 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm"
                  >
                    <i className="ph-bold ph-device-mobile text-[14px]"></i>
                    Instalar
                  </button>
                )}
                <button 
                  onClick={() => setSettingsOpen(true)}
                  className="text-white p-2 rounded-full hover:bg-white/20 transition"
                >
                  <i className="ph-fill ph-gear text-[22px]"></i>
                </button>
              </div>
            </div>

            {settingsOpen && (
              <div className="absolute inset-0 bg-black/60 z-50 flex flex-col justify-end">
                <div className="bg-white rounded-t-2xl p-6 h-[90%] flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-xl font-bold text-gray-800">Configurações</h2>
                    <button onClick={() => setSettingsOpen(false)} className="p-2 bg-gray-100 rounded-full text-gray-600">
                      <i className="ph-bold ph-x text-[20px]"></i>
                    </button>
                  </div>
                  
                  <div className="mb-4 p-3 bg-gray-50 rounded-lg border border-gray-200">
                    <p className="text-xs font-bold text-gray-700">Status do Aplicativo (PWA)</p>
                    <p className={`text-xs mt-1 font-semibold ${swStatus.includes('✅') ? 'text-green-600' : 'text-red-500'}`}>
                      {swStatus}
                    </p>
                  </div>

                  <p className="text-sm text-gray-500 mb-6">
                    Defina o nome da sua unidade e faça o upload dos logotipos do cabeçalho.
                  </p>

                  <div className="space-y-6 overflow-y-auto pb-4">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Nome da Unidade / Contrato</label>
                      <input type="text" value={settings.unitName} onChange={(e) => handleSettingChange('unitName', e.target.value)} className="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none uppercase bg-gray-50" placeholder="Ex: PARQUE LOGÍSTICO AERO GRU I" />
                    </div>

                    <div className="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center relative hover:bg-gray-50 transition cursor-pointer">
                      <input type="file" accept="image/png, image/jpeg" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => handleLogoUpload(e, 'leftLogo')} />
                      {settings.leftLogo ? (
                        <img src={settings.leftLogo} alt="Logo Esq" className="h-16 mx-auto object-contain" />
                      ) : (
                        <div className="flex flex-col items-center text-blue-600">
                          <i className="ph-bold ph-upload-simple text-[24px] mb-2"></i>
                          <span className="text-sm font-semibold">Logo Esquerdo (Ex: Vilella)</span>
                        </div>
                      )}
                    </div>

                    <div className="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center relative hover:bg-gray-50 transition cursor-pointer">
                      <input type="file" accept="image/png, image/jpeg" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => handleLogoUpload(e, 'rightLogo')} />
                      {settings.rightLogo ? (
                        <img src={settings.rightLogo} alt="Logo Dir" className="h-16 mx-auto object-contain" />
                      ) : (
                        <div className="flex flex-col items-center text-blue-600">
                          <i className="ph-bold ph-upload-simple text-[24px] mb-2"></i>
                          <span className="text-sm font-semibold">Logo Direito (Ex: C&W)</span>
                        </div>
                      )}
                    </div>
                  </div>

                  <button onClick={() => setSettingsOpen(false)} className="mt-auto w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold text-lg">
                    Concluir
                  </button>
                </div>
              </div>
            )}

            {successMessage && (
              <div className="absolute top-16 left-4 right-4 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 z-40">
                <i className="ph-fill ph-check-circle text-green-600 text-[20px]"></i>
                <p className="font-medium text-sm">{successMessage}</p>
              </div>
            )}

            <div className="flex-1 overflow-y-auto p-6 flex flex-col">
              {step === 1 && (
                <div className="flex-1 flex flex-col">
                  <h2 className="text-xl font-bold text-gray-800 mb-6 border-b pb-2">Identificação</h2>

                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Responsável (Seu Nome)</label>
                      <input type="text" name="responsavel" value={formData.responsavel} onChange={handleInputChange} className={`w-full border ${errors.responsavel ? 'border-red-500' : 'border-gray-300'} rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none uppercase bg-gray-50`} placeholder="Ex: THAWILLYS ROCHA"/>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-1">Matrícula</label>
                        <input type="text" name="matricula" value={formData.matricula} onChange={handleInputChange} className={`w-full border ${errors.matricula ? 'border-red-500' : 'border-gray-300'} rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none uppercase bg-gray-50`} placeholder="Ex: VLL-0003"/>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-1">Área/Local</label>
                        <input type="text" name="local" value={formData.local} onChange={handleInputChange} className={`w-full border ${errors.local ? 'border-red-500' : 'border-gray-300'} rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none uppercase bg-gray-50`} placeholder="Ex: G-200 (LATAM)"/>
                      </div>
                    </div>

                    <div className="pt-2">
                      <label className="block text-sm font-semibold text-gray-700 mb-2">Tipo de Registro</label>
                      <select name="type" value={formData.type} onChange={handleInputChange} className={`w-full appearance-none bg-white border ${errors.type ? 'border-red-500' : 'border-gray-300'} rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium`}>
                        <option value="" disabled>Selecione a Ocorrência...</option>
                        {reportTypes.map(type => (
                          <option key={type} value={type}>{type}</option>
                        ))}
                      </select>
                    </div>

                    <button onClick={handleNextStep} className="w-full bg-[#002f5b] text-white rounded-xl py-4 font-bold text-lg shadow-lg hover:bg-blue-900 transition-all flex items-center justify-center gap-2 mt-8">
                      Continuar <i className="ph-bold ph-caret-right text-[20px]"></i>
                    </button>
                  </div>
                </div>
              )}

              {step === 2 && (
                <div className="flex flex-col gap-5 pb-24">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Data do Fato</label>
                      <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 bg-gray-50" />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Horário</label>
                      <input type="time" name="time" value={formData.time} onChange={handleInputChange} className="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 bg-gray-50" />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">Descrição da Ocorrência</label>
                    <textarea name="description" value={formData.description} onChange={handleInputChange} rows="3" spellCheck={true} lang="pt-BR" className={`w-full border ${errors.description ? 'border-red-500' : 'border-gray-300'} rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm`} placeholder="Descreva os detalhes..."></textarea>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">Ação Imediata Tomada</label>
                    <textarea name="action" value={formData.action} onChange={handleInputChange} rows="2" spellCheck={true} lang="pt-BR" className={`w-full border ${errors.action ? 'border-red-500' : 'border-gray-300'} rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm`} placeholder="O que foi feito?"></textarea>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">Observações (Opcional)</label>
                    <textarea name="observations" value={formData.observations} onChange={handleInputChange} rows="2" spellCheck={true} lang="pt-BR" className="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm"></textarea>
                  </div>

                  <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mt-2">
                    <div className="flex items-center justify-between mb-3">
                      <label className="block text-sm font-bold text-gray-800">
                        Fotos <span className="text-gray-500 font-normal">({images.length}/3)</span>
                      </label>
                      {images.length < 3 && (
                        <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-1.5 text-blue-700 bg-blue-100 px-3 py-1.5 rounded-md text-sm font-bold hover:bg-blue-200">
                          <i className="ph-bold ph-camera text-[16px]"></i> Anexar
                        </button>
                      )}
                    </div>
                    
                    <input type="file" accept="image/*" multiple className="hidden" ref={fileInputRef} onChange={handleImageUpload} />

                    {images.length === 0 ? (
                      <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 flex flex-col items-center justify-center text-gray-400">
                        <i className="ph-bold ph-camera text-[28px] mb-2 opacity-50"></i>
                        <p className="text-xs text-center font-medium">Nenhuma foto anexada.</p>
                      </div>
                    ) : (
                      <div className="grid grid-cols-3 gap-2">
                        {images.map((img, idx) => (
                          <div key={idx} className="relative aspect-square rounded-lg overflow-hidden border border-gray-200 shadow-sm group">
                            <img src={img} alt="Preview" className="w-full h-full object-cover" />
                            <button onClick={() => removeImage(idx)} className="absolute top-1 right-1 bg-white/90 text-red-500 p-1 rounded-full shadow-sm hover:bg-red-50 hover:text-red-600">
                              <i className="ph-bold ph-x text-[14px]"></i>
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* NOVO: Campo de Assinatura Digital */}
                  <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mt-2">
                    <div className="flex items-center justify-between mb-2">
                      <label className="block text-sm font-bold text-gray-800">Assinatura Digital <span className="text-gray-500 font-normal">(Opcional)</span></label>
                      {hasSignature && (
                        <button onClick={clearSignature} className="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded">Limpar</button>
                      )}
                    </div>
                    <div className="relative bg-white rounded-lg border border-gray-300 overflow-hidden" style={{ touchAction: 'none' }}>
                      {!hasSignature && !isDrawing && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40">
                          <p className="text-sm font-medium text-gray-500">Assine aqui</p>
                        </div>
                      )}
                      <canvas
                        ref={sigCanvasRef}
                        width={800}
                        height={300}
                        style={{ width: '100%', height: '120px' }}
                        onMouseDown={startDrawing}
                        onMouseMove={draw}
                        onMouseUp={stopDrawing}
                        onMouseLeave={stopDrawing}
                        onTouchStart={startDrawing}
                        onTouchMove={draw}
                        onTouchEnd={stopDrawing}
                        className="cursor-crosshair"
                      />
                    </div>
                  </div>
                  
                </div>
              )}
            </div>

            {step === 2 && (
              <div className="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 flex gap-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                <button
                  onClick={() => generatePDF('save')}
                  className={`flex-1 flex flex-col items-center justify-center py-3 rounded-xl font-bold text-sm text-white shadow-lg transition-all ${isGenerating ? 'bg-gray-400' : 'bg-[#002f5b]'}`}
                >
                  <i className="ph-bold ph-download-simple text-[22px] mb-1"></i>
                  Salvar
                </button>
                <button
                  onClick={() => generatePDF('share')}
                  className={`flex-1 flex flex-col items-center justify-center py-3 rounded-xl font-bold text-sm text-white shadow-lg transition-all ${isGenerating ? 'bg-gray-400' : 'bg-green-600'}`}
                >
                  <i className="ph-bold ph-share-network text-[22px] mb-1"></i>
                  Compartilhar
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
